# Centro TOV — reverse proxy do nginx (host) para o container do frontend
# em 127.0.0.1:8084. Bloco HTTP; rode `certbot --nginx -d centro-tov.kafune.xyz`
# para o SSL ser adicionado automaticamente.
server {
    listen 80;
    listen [::]:80;
    server_name centro-tov.kafune.xyz;

    location / {
        proxy_pass http://127.0.0.1:8084;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 30m;
    }
}
