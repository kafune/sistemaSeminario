# Opcional: sobe tudo em containers (útil na VPS se preferir Docker).
services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${TOV_DB_PASSWORD:?defina TOV_DB_PASSWORD}
      MYSQL_DATABASE: tov
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${TOV_DB_PASSWORD}"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      TOV_DB_HOST: db
      TOV_DB_PASSWORD: ${TOV_DB_PASSWORD}
      TOV_SECRET_KEY: ${TOV_SECRET_KEY:?defina TOV_SECRET_KEY}
      TOV_CORS_ORIGINS: ${TOV_CORS_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  dbdata:
